# ══════════════════════════════════════════════════════════════
#  REVIEWSERVICE — TEST profile
#  Used by JUnit tests: @ActiveProfiles("test")
#  H2 in-memory DB — no external services needed
# ══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:h2:mem:review_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── Eureka disabled in tests ────────────────────────────────────────
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ── Redis disabled in tests (use simple cache) ──────────────────────
spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Tracing disabled in tests ───────────────────────────────────────
management.tracing.sampling.probability=0.0

# ── Swagger enabled in tests ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.lpu=INFO
logging.level.org.springframework.security=WARN
