#  NOTIFICATIONSERVICE — DEV profile
#  Run locally: java -jar app.jar --spring.profiles.active=dev
#  PostgreSQL must be running on localhost:5432
# ══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync_notification
spring.datasource.username=postgres
spring.datasource.password=Vignan@2004
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.enabled=true

# ── RabbitMQ ────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ── Email credentials (dev) ─────────────────────────────────────────
spring.mail.username=${MAIL_USERNAME:vignanbaratam@gmail.com}
spring.mail.password=${MAIL_PASSWORD:iuietzxymlqztvzx}

# ── Tracing ─────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ── Swagger / OpenAPI ──────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.lpu=DEBUG
logging.level.org.springframework.security=DEBUG
