# ══════════════════════════════════════════════════════════════
#  GROUPSERVICE — DEV profile
#  Run locally: java -jar app.jar --spring.profiles.active=dev
#  PostgreSQL must be running on localhost:5432
# ══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync_group
spring.datasource.username=postgres
spring.datasource.password=Vignan@2004
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.enabled=true
eureka.instance.prefer-ip-address=true

# ── Tracing ─────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ── Swagger / OpenAPI ──────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.lpu=DEBUG
logging.level.org.springframework.security=DEBUG
