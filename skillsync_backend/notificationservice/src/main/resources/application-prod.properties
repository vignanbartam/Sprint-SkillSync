# ══════════════════════════════════════════════════════════════
#  NOTIFICATIONSERVICE — PROD profile
#  Used in Docker: SPRING_PROFILES_ACTIVE=prod
#  All hostnames point to Docker service names
# ══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:postgresql://postgres:5432/skillsync_notification
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Vignan@2004}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://eurekaserver:8761/eureka
eureka.client.enabled=true

# ── RabbitMQ ────────────────────────────────────────────────────────
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ── Email credentials (prod — must set env vars) ────────────────────
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ── Tracing ─────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# ── Swagger DISABLED in prod ────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.lpu=WARN
logging.level.org.springframework.security=WARN
logging.level.root=ERROR

# ── API Docs path (kept enabled so gateway can fetch) ──────────────
springdoc.api-docs.path=/v3/api-docs

# ── Eureka Instance (Docker) ─────────────────────────────────────────
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── Swagger paths ───────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
