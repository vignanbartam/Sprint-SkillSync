# ══════════════════════════════════════════════════════════════
#  APIGATEWAY — DEV profile
#  Run locally: java -jar app.jar --spring.profiles.active=dev
# ══════════════════════════════════════════════════════════════

# ── Eureka ──────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ── Swagger Aggregation (enabled in dev) ────────────────────────────
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/authservice/v3/api-docs
springdoc.swagger-ui.urls[1].name=Session Service
springdoc.swagger-ui.urls[1].url=/sessionservice/v3/api-docs
springdoc.swagger-ui.urls[2].name=Review Service
springdoc.swagger-ui.urls[2].url=/reviewservice/v3/api-docs
springdoc.swagger-ui.urls[3].name=Skill Service
springdoc.swagger-ui.urls[3].url=/skillservice/v3/api-docs
springdoc.swagger-ui.urls[4].name=Group Service
springdoc.swagger-ui.urls[4].url=/groupservice/v3/api-docs

# ── Tracing ──────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ── Logging ──────────────────────────────────────────────────────────
logging.level.com.lpu=DEBUG
